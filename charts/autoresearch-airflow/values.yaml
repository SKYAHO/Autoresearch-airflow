# Default values for the Autoresearch Airflow GKE deployment.
# Environment-specific values should live outside git or in *.example.yaml files.

global:
  projectId: "replace-with-gcp-project"
  region: "asia-northeast3"

airflow:
  executor: KubernetesExecutor

  defaultAirflowRepository: apache/airflow
  defaultAirflowTag: "2.10.5"
  airflowVersion: "2.10.5"

  createUserJob:
    useHelmHooks: false
  migrateDatabaseJob:
    useHelmHooks: false

  statsd:
    enabled: true

  redis:
    enabled: false

  postgresql:
    enabled: true

  env:
    - name: AIRFLOW__CORE__LOAD_EXAMPLES
      value: "False"
    - name: AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL
      value: "30"
    - name: AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL
      value: "30"

  extraEnv: |
    - name: YOUTUBE_BACKFILL_SOURCE
      valueFrom:
        secretKeyRef:
          name: autoresearch-airflow-env
          key: YOUTUBE_BACKFILL_SOURCE
          optional: true
    - name: YOUTUBE_API_KEY
      valueFrom:
        secretKeyRef:
          name: autoresearch-airflow-env
          key: YOUTUBE_API_KEY
          optional: false
    - name: YOUTUBE_LAKE_BUCKET
      valueFrom:
        secretKeyRef:
          name: autoresearch-airflow-env
          key: YOUTUBE_LAKE_BUCKET
          optional: false

  dags:
    persistence:
      enabled: false
    gitSync:
      enabled: true
      repo: https://github.com/SKYAHO/Autoresearch.git
      branch: main
      rev: HEAD
      ref: main
      depth: 1
      maxFailures: 0
      subPath: dags
      wait: 30
      containerName: git-sync
      uid: 65533

  logs:
    persistence:
      enabled: false

  scheduler:
    replicas: 1
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: "autoresearch-airflow@replace-with-gcp-project.iam.gserviceaccount.com"

  triggerer:
    enabled: true
    replicas: 1
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: "autoresearch-airflow@replace-with-gcp-project.iam.gserviceaccount.com"

  webserver:
    replicas: 1
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: "autoresearch-airflow@replace-with-gcp-project.iam.gserviceaccount.com"
    defaultUser:
      enabled: true
      role: Admin
      username: admin
      email: admin@example.com
      firstName: Autoresearch
      lastName: Admin

  workers:
    replicas: 1
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: "autoresearch-airflow@replace-with-gcp-project.iam.gserviceaccount.com"

  config:
    core:
      dags_are_paused_at_creation: "False"
      load_examples: "False"
    logging:
      remote_logging: "False"
