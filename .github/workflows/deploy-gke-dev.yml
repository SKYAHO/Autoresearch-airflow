name: Deploy Airflow dev

on:
  push:
    branches:
      - main
    paths:
      - deploy/airflow/values.yaml
      - .github/workflows/deploy-gke-dev.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: airflow-dev-gke
  cancel-in-progress: false

jobs:
  deploy:
    name: Helm upgrade and runtime verification
    runs-on: ubuntu-latest
    environment: dev-gke
    timeout-minutes: 360
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
      GKE_LOCATION: ${{ vars.GKE_LOCATION }}
      GKE_DEPLOYER_SA: ${{ vars.GKE_DEPLOYER_SA }}
      WIF_PROVIDER_ID: ${{ vars.WIF_PROVIDER_ID }}
      AIRFLOW_NAMESPACE: airflow
      AIRFLOW_RELEASE: airflow
      PRODUCTION_DAG_ID: youtube_gcs_action_log_pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          for variable_name in \
            GCP_PROJECT_ID GKE_CLUSTER GKE_LOCATION \
            GKE_DEPLOYER_SA WIF_PROVIDER_ID
          do
            if [[ -z "${!variable_name}" ]]; then
              echo "::error::$variable_name is not configured"
              exit 1
            fi
          done
          python scripts/promote_batch_image.py \
            --values deploy/airflow/values.yaml \
            --check

      - name: Authenticate to GCP with Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER_ID }}
          service_account: ${{ env.GKE_DEPLOYER_SA }}

      - name: Get GKE credentials through the DNS endpoint
        uses: google-github-actions/get-gke-credentials@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          namespace: ${{ env.AIRFLOW_NAMESPACE }}
          use_dns_based_endpoint: true

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Verify namespace-scoped deploy permissions
        shell: bash
        run: |
          set -euo pipefail
          # kubectl auth can-i는 yes/no를 출력하고 허용 시 exit 0을 반환한다.
          # --quiet로 출력을 억제하고 종료 코드로만 판정한다(set -e가 거부 시 실패시킴).
          kubectl auth can-i get pods -n "$AIRFLOW_NAMESPACE" --quiet
          kubectl auth can-i create secrets -n "$AIRFLOW_NAMESPACE" --quiet
          kubectl auth can-i patch deployments.apps -n "$AIRFLOW_NAMESPACE" --quiet
          kubectl auth can-i create roles.rbac.authorization.k8s.io \
            -n "$AIRFLOW_NAMESPACE" --quiet

      - name: Build and validate Helm chart
        shell: bash
        run: |
          set -euo pipefail
          helm repo add apache-airflow https://airflow.apache.org
          helm repo update
          helm dependency update deploy/airflow
          helm lint deploy/airflow \
            --values deploy/airflow/values.yaml
          helm template "$AIRFLOW_RELEASE" deploy/airflow \
            --namespace "$AIRFLOW_NAMESPACE" \
            --values deploy/airflow/values.yaml \
            >/tmp/airflow-gke-dev.yaml

      - name: Capture current release and DAG state
        id: state
        shell: bash
        run: |
          set -euo pipefail
          previous_revision="$(
            helm list -n "$AIRFLOW_NAMESPACE" \
              --filter "^${AIRFLOW_RELEASE}$" \
              --output json | jq -r '.[0].revision // ""'
          )"
          scheduler_pod="$(
            kubectl get pod -n "$AIRFLOW_NAMESPACE" \
              -l component=scheduler \
              -o jsonpath='{.items[0].metadata.name}'
          )"
          dags_json="$(
            kubectl exec -n "$AIRFLOW_NAMESPACE" "$scheduler_pod" \
              -c scheduler -- airflow dags list --output json 2>/dev/null \
              | grep -vE '^\[[0-9]{4}-'
          )"
          was_paused="$(
            DAGS_JSON="$dags_json" python - <<'PY'
          import json
          import os

          dag_id = "youtube_gcs_action_log_pipeline"
          dags = json.loads(os.environ["DAGS_JSON"])
          matches = [dag for dag in dags if dag["dag_id"] == dag_id]
          if len(matches) != 1:
              raise SystemExit(f"expected one {dag_id} DAG, found {len(matches)}")
          print(str(matches[0]["is_paused"]).lower())
          PY
          )"
          echo "previous_revision=$previous_revision" >> "$GITHUB_OUTPUT"
          echo "was_paused=$was_paused" >> "$GITHUB_OUTPUT"

      - name: Preflight email alert Secret
        shell: bash
        run: |
          set -euo pipefail
          kubectl get secret airflow-email-alerts -n "$AIRFLOW_NAMESPACE" -o json \
            | python -c '
          import base64
          import binascii
          import json
          import sys

          expected = {
              "smtp-host", "smtp-port", "smtp-starttls", "smtp-ssl",
              "smtp-user", "smtp-password", "smtp-mail-from", "alert-recipients",
          }
          data = json.load(sys.stdin).get("data") or {}
          actual = set(data)
          missing = sorted(expected - actual)
          extra = sorted(actual - expected)
          if missing or extra:
              raise SystemExit(f"Secret key mismatch: missing={missing}, extra={extra}")

          for key in sorted(expected):
              try:
                  value = base64.b64decode(data[key], validate=True)
              except (binascii.Error, ValueError):
                  raise SystemExit(f"Secret value is not valid base64: key={key}") from None
              if not value:
                  raise SystemExit(f"Secret value is empty: key={key}")
              if value.endswith((b"\n", b"\r")):
                  raise SystemExit(f"Secret value has trailing CR/LF: key={key}")
          '

      - name: Pause production DAG
        shell: bash
        run: |
          set -euo pipefail
          scheduler_pod="$(
            kubectl get pod -n "$AIRFLOW_NAMESPACE" \
              -l component=scheduler \
              -o jsonpath='{.items[0].metadata.name}'
          )"
          kubectl exec -n "$AIRFLOW_NAMESPACE" "$scheduler_pod" \
            -c scheduler -- airflow dags pause "$PRODUCTION_DAG_ID"

      - name: Wait for active production run to finish
        timeout-minutes: 300
        shell: bash
        run: |
          set -euo pipefail
          scheduler_pod="$(
            kubectl get pod -n "$AIRFLOW_NAMESPACE" \
              -l component=scheduler \
              -o jsonpath='{.items[0].metadata.name}'
          )"
          kubectl exec -i -n "$AIRFLOW_NAMESPACE" "$scheduler_pod" \
            -c scheduler -- \
            env PRODUCTION_DAG_ID="$PRODUCTION_DAG_ID" bash -s <<'REMOTE_WAIT'
          set -euo pipefail
          while true; do
            active_runs=0
            for state in queued running; do
              runs_json="$(
                airflow dags list-runs \
                  --dag-id "$PRODUCTION_DAG_ID" \
                  --state "$state" \
                  --output json 2>/dev/null \
                  | grep -vE '^\[[0-9]{4}-'
              )"
              state_count="$(
                RUNS_JSON="$runs_json" python -c \
                  'import json, os; print(len(json.loads(os.environ["RUNS_JSON"])))'
              )"
              active_runs=$((active_runs + state_count))
            done

            if [[ "$active_runs" -eq 0 ]]; then
              echo "Production DAG is idle."
              break
            fi
            echo "Waiting for $active_runs active production DAG run(s)."
            sleep 60
          done
          REMOTE_WAIT

      - name: Refresh GCP authentication after production wait
        if: always()
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER_ID }}
          service_account: ${{ env.GKE_DEPLOYER_SA }}

      - name: Refresh GKE credentials after production wait
        if: always()
        uses: google-github-actions/get-gke-credentials@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          namespace: ${{ env.AIRFLOW_NAMESPACE }}
          use_dns_based_endpoint: true

      - name: Upgrade Airflow release
        id: upgrade
        shell: bash
        run: |
          set -euo pipefail
          helm upgrade --install "$AIRFLOW_RELEASE" deploy/airflow \
            --namespace "$AIRFLOW_NAMESPACE" \
            --values deploy/airflow/values.yaml \
            --atomic \
            --wait \
            --wait-for-jobs \
            --timeout 15m \
            --history-max 10

      - name: Verify Airflow runtime
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status statefulset/airflow-scheduler \
            -n "$AIRFLOW_NAMESPACE" --timeout=10m
          kubectl rollout status deployment/airflow-webserver \
            -n "$AIRFLOW_NAMESPACE" --timeout=10m

          scheduler_pod="$(
            kubectl get pod -n "$AIRFLOW_NAMESPACE" \
              -l component=scheduler \
              -o jsonpath='{.items[0].metadata.name}'
          )"
          expected_image="$(
            python scripts/promote_batch_image.py \
              --values deploy/airflow/values.yaml \
              --check | sed -n 's/^digest_ref=//p'
          )"

          airflow_cli() {
            local description="$1"
            shift
            local attempt output

            for attempt in $(seq 1 12); do
              if output="$(kubectl exec -n "$AIRFLOW_NAMESPACE" "$scheduler_pod" \
                -c scheduler -- airflow "$@" 2>/dev/null)"; then
                printf '%s\n' "$output"
                return 0
              fi

              echo "Airflow CLI가 아직 준비되지 않았습니다 (${description}, ${attempt}/12)." >&2
              sleep 10
            done

            echo "::error::Airflow CLI 준비 시간(2분)을 초과했습니다: ${description}" >&2
            return 1
          }

          batch_image_ready=false
          for attempt in $(seq 1 12); do
            variable_output="$(
              kubectl exec -n "$AIRFLOW_NAMESPACE" "$scheduler_pod" \
                -c scheduler -- airflow variables get \
                AUTORESEARCH_BATCH_IMAGE 2>/dev/null || true
            )"
            deployed_image="$(grep -vE '^\[[0-9]{4}-' <<<"$variable_output" | tail -n 1 || true)"
            if [[ "$deployed_image" == "$expected_image" ]]; then
              batch_image_ready=true
              break
            fi

            echo "Scheduler 초기화 대기 중입니다 (batch image ${attempt}/12)." >&2
            sleep 10
          done
          if [[ "$batch_image_ready" != true ]]; then
            echo "::error::AUTORESEARCH_BATCH_IMAGE가 기대 digest로 준비되지 않았습니다." >&2
            echo "expected=${expected_image}" >&2
            echo "actual=${deployed_image:-<empty>}" >&2
            exit 1
          fi

          import_errors="$(
            airflow_cli "DAG import error 조회" dags list-import-errors --output json \
              | grep -vE '^\[[0-9]{4}-'
          )"
          IMPORT_ERRORS="$import_errors" python -c \
            'import json, os; assert json.loads(os.environ["IMPORT_ERRORS"]) == []'

          task_output="$(
            airflow_cli "production DAG task 조회" tasks list "$PRODUCTION_DAG_ID"
          )"
          task_count="$(
            grep -Ec \
              '^(collect_youtube_trending_partition|ensure_action_log_shard_[0-9]{3}|merge_action_log_partition|validate_action_log_partition)$' \
              <<<"$task_output" || true
          )"
          if [[ "$task_count" -ne 8 ]]; then
            echo "::error::production DAG task 수가 기대값(8)과 다릅니다: ${task_count}" >&2
            printf '%s\n' "$task_output" >&2
            exit 1
          fi

          feast_task_output="$(
            airflow_cli "Feast materialize DAG task 조회" tasks list feast_online_store_materialize
          )"
          feast_task_count="$(
            grep -Ec '^(materialize_online_store|wait_for_bigquery_incremental_load)$' \
              <<<"$feast_task_output" || true
          )"
          if [[ "$feast_task_count" -ne 2 ]]; then
            echo "::error::Feast materialize DAG task 수가 기대값(2)과 다릅니다: ${feast_task_count}" >&2
            printf '%s\n' "$feast_task_output" >&2
            exit 1
          fi

          pool_json="$(
            airflow_cli "OpenRouter pool 조회" pools get action_log_openrouter --output json \
              | grep -vE '^\[[0-9]{4}-'
          )"
          POOL_JSON="$pool_json" python -c \
            'import json, os; assert int(json.loads(os.environ["POOL_JSON"])[0]["slots"]) == 2'

          kubectl get pods -n "$AIRFLOW_NAMESPACE"
          helm status "$AIRFLOW_RELEASE" -n "$AIRFLOW_NAMESPACE"

      - name: Roll back after post-deploy verification failure
        if: ${{ failure() && steps.upgrade.outcome == 'success' && steps.verify.outcome == 'failure' }}
        shell: bash
        run: |
          set -euo pipefail
          previous_revision="${{ steps.state.outputs.previous_revision }}"
          if [[ -z "$previous_revision" ]]; then
            echo "::error::No previous Helm revision is available for rollback"
            exit 1
          fi
          helm rollback "$AIRFLOW_RELEASE" "$previous_revision" \
            --namespace "$AIRFLOW_NAMESPACE" \
            --wait \
            --timeout 15m

      - name: Restore production DAG state
        if: ${{ always() && steps.state.outputs.was_paused != '' }}
        shell: bash
        run: |
          set -euo pipefail
          scheduler_pod="$(
            kubectl get pod -n "$AIRFLOW_NAMESPACE" \
              -l component=scheduler \
              -o jsonpath='{.items[0].metadata.name}'
          )"
          if [[ "${{ steps.state.outputs.was_paused }}" == "false" ]]; then
            kubectl exec -n "$AIRFLOW_NAMESPACE" "$scheduler_pod" \
              -c scheduler -- airflow dags unpause "$PRODUCTION_DAG_ID"
          else
            kubectl exec -n "$AIRFLOW_NAMESPACE" "$scheduler_pod" \
              -c scheduler -- airflow dags pause "$PRODUCTION_DAG_ID"
          fi
