name: Helm Lint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Add Airflow Helm repo
        run: |
          helm repo add apache-airflow https://airflow.apache.org
          helm repo update

      - name: Build chart dependencies
        run: helm dependency update charts/autoresearch-airflow

      - name: Lint chart
        run: helm lint charts/autoresearch-airflow

      - name: Render chart
        run: |
          helm template autoresearch-airflow charts/autoresearch-airflow \
            --namespace airflow \
            --values environments/gke-values.example.yaml \
            >/tmp/autoresearch-airflow.yaml

      - name: Render concrete dev values
        run: |
          helm template airflow charts/autoresearch-airflow \
            --namespace airflow \
            --values helm/values-gke-dev.yaml \
            >/tmp/airflow-gke-dev.yaml
