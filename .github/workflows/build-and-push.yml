name: Build and Push Airflow Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Airflow image tag (defaults to short workflow SHA)'
        required: false
        default: ''

env:
  REGION: asia-northeast3
  PROJECT_ID: ar-infra-501607
  REPOSITORY: autoresearch-dev-docker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve variables
        id: vars
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA::7}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/185508640491/locations/global/workloadIdentityPools/autoresearch-github/providers/github
          service_account: ${{ secrets.GAR_PUSHER_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build airflow image
        run: |
          docker build \
            -f docker/airflow/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/autoresearch-airflow:${{ steps.vars.outputs.tag }} \
            docker/airflow

      - name: Push airflow image
        run: docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/autoresearch-airflow:${{ steps.vars.outputs.tag }}

      - name: Summary
        run: |
          echo "## Airflow image pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`autoresearch-airflow:${{ steps.vars.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
