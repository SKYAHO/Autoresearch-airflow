name: Feature request
description: Airflow on GKE infrastructure improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 현재 운영/배포 흐름에서 어떤 불편이나 위험이 있는지 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 변경
      description: 원하는 Helm/GKE/Airflow/GitHub Actions 변경을 설명해 주세요.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - Helm chart / values
        - GKE / Workload Identity
        - git-sync DAG delivery
        - Airflow runtime configuration
        - CI/CD / Claude review
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      placeholder: |
        - [ ] helm lint 통과
        - [ ] helm template에서 ... 확인
        - [ ] README/docs 갱신
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려한 다른 방식이 있으면 적어 주세요.
    validations:
      required: false
